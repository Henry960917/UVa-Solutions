name: Update UVa Progress

on:
  push:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write   

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4   

      - name: Count solved problems
        id: count
        run: |
          solved=$(find CPP -name "*.cpp" | wc -l)
          echo "solved=$solved" >> $GITHUB_OUTPUT

      - name: Update README
        run: |
          total=10000
          solved=${{ steps.count.outputs.solved }}
          percent=$(echo "scale=2; $solved/$total*100" | bc)

          awk -v s="$solved" -v p="$percent" '
          /Solved:/ {$0="- Solved: " s}
          /Progress:/ {$0="- Progress: " p "%"}
          {print}
          ' README.md > temp && mv temp README.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "update progress" || echo "no changes"
          git push
